<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Email Studio Simulator</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;700;800&display=swap" rel="stylesheet">

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: 'Plus Jakarta Sans', sans-serif;
  background: #f8f7fb;
  color: #1d1736;
  height: 100vh;
  display: flex;
  flex-direction: column;
}

/* TOP BAR */
.topbar {
  height: 64px;
  background: white;
  border-bottom: 1px solid #ece7f5;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 16px;
}

.brand {
  font-weight: 800;
  background: linear-gradient(90deg,#7a30ba,#f86e41);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.controls {
  display: flex;
  align-items: center;
  gap: 12px;
}

select {
  padding: 8px 10px;
  border-radius: 10px;
  border: 1px solid #ddd;
  background: white;
}

/* toggle */
.switch {
  position: relative;
  display: inline-block;
  width: 46px;
  height: 24px;
}

.switch input { display: none; }

.slider {
  position: absolute;
  cursor: pointer;
  inset: 0;
  background: #ccc;
  border-radius: 999px;
  transition: .3s;
}

.slider:before {
  content: "";
  position: absolute;
  height: 18px;
  width: 18px;
  left: 3px;
  top: 3px;
  background: white;
  border-radius: 50%;
  transition: .3s;
}

input:checked + .slider {
  background: #7a30ba;
}

input:checked + .slider:before {
  transform: translateX(22px);
}

/* APP */
.app {
  display: flex;
  flex: 1;
  overflow: hidden;
}

/* EDITOR */
.editor {
  width: 40%;
  background: white;
  border-right: 1px solid #ece7f5;
  display: flex;
  flex-direction: column;
}

.editor textarea {
  flex: 1;
  border: none;
  padding: 16px;
  outline: none;
  font-size: 14px;
  line-height: 1.6;
  resize: none;
}

/* PREVIEW */
.preview {
  flex: 1;
  display: flex;
  justify-content: center;
  align-items: flex-start;
  padding: 20px;
  background: #f3f4f6;
  overflow: auto;
}

.frame {
  background: white;
  border-radius: 12px;
  box-shadow: 0 18px 50px rgba(0,0,0,0.1);
  overflow: hidden;
  transition: all .3s ease;
}

/* DEVICE SIZES */
.device-desktop { width: 650px; }
.device-outlook { width: 600px; }
.device-iphone { width: 390px; }
.device-android { width: 360px; }

.frame-content {
  padding: 20px;
  font-size: 14px;
  line-height: 1.6;
}

/* DARK MODE */
.dark body {
  background: #1a1a1a;
  color: white;
}

.dark .topbar,
.dark .editor {
  background: #2a2a2a;
  color: white;
}

.dark .preview {
  background: #111;
}

.dark .frame {
  background: #1e1e1e;
  color: white;
}
</style>
</head>

<body>

<div class="topbar">
  <div class="brand">Email Studio</div>

  <div class="controls">

    <!-- VIEWPORT -->
    <select id="deviceSelect">
      <option value="device-outlook">Outlook / Gmail</option>
      <option value="device-iphone">iPhone</option>
      <option value="device-android">Android</option>
      <option value="device-desktop">Desktop</option>
    </select>

    <!-- DARK MODE -->
    <label class="switch">
      <input type="checkbox" id="darkToggle">
      <span class="slider"></span>
    </label>

  </div>
</div>

<div class="app">

  <!-- EDITOR -->
  <div class="editor">
    <textarea id="editor" placeholder="Paste your Salesforce email HTML or text here..."></textarea>
  </div>

  <!-- PREVIEW -->
  <div class="preview">
    <div class="frame device-outlook" id="frame">
      <div class="frame-content" id="preview"></div>
    </div>
  </div>

</div>

<script>
const editor = document.getElementById("editor");
const preview = document.getElementById("preview");
const frame = document.getElementById("frame");
const deviceSelect = document.getElementById("deviceSelect");
const darkToggle = document.getElementById("darkToggle");

// LIVE COPY PASTE PREVIEW
editor.addEventListener("input", () => {
  preview.innerHTML = editor.value;
});

// DEVICE SWITCH
deviceSelect.addEventListener("change", () => {
  frame.className = "frame " + deviceSelect.value;
});

// DARK MODE
darkToggle.addEventListener("change", () => {
  document.body.classList.toggle("dark", darkToggle.checked);
});
</script>

</body>
</html>
